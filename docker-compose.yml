services:
  hummingbot-api:
    container_name: hummingbot-api
    image: hummingbot/hummingbot-api:latest
    ports:
      - "8001:8000"
    volumes:
      - ./bots:/hummingbot-api/bots
      - c:/Users/dubbe/MiTradeHb/hummingbot_ext/connectors/bybit_eu:/opt/conda/envs/hummingbot-api/lib/python3.12/site-packages/hummingbot/connector/exchange/bybit_eu:ro
      - c:/Users/dubbe/MiTradeHb/hummingbot_ext/connectors/bybit_eu_testnet:/opt/conda/envs/hummingbot-api/lib/python3.12/site-packages/hummingbot/connector/exchange/bybit_eu_testnet:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # Host metrics: mount the host's /proc read-only so the /system/resources
      # route reports HOST CPU/RAM/load instead of the container's.
      - /proc:/host/proc:ro
      # Disk usage probe: psutil.disk_usage() only stats the filesystem CONTAINING
      # this path, so a single non-sensitive host file on the root partition yields
      # the host root disk totals without exposing the host filesystem tree.
      - /etc/hostname:/host/disk-probe:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      # Override specific values for Docker networking
      - BROKER_HOST=emqx
      - DATABASE_URL=postgresql+asyncpg://hbot:hummingbot-api@postgres:5432/hummingbot_api
      - GATEWAY_URL=http://host.docker.internal:15888
      # Point psutil at the mounted host paths (see volumes above)
      - HOST_PROC=/host/proc
      - HOST_DISK_PATH=/host/disk-probe
    extra_hosts:
      # Map host.docker.internal to host gateway for Linux compatibility
      # On macOS/Windows, Docker Desktop provides this automatically
      # On Linux, this maps to the docker bridge gateway IP
      - "host.docker.internal:host-gateway"
    networks:
      - emqx-bridge
    depends_on:
      - postgres
  emqx:
    container_name: hummingbot-broker
    image: emqx:5
    restart: unless-stopped
    environment:
      - EMQX_NAME=emqx
      - EMQX_HOST=node1.emqx.local
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@node1.emqx.local]
      - EMQX_LOADED_PLUGINS="emqx_recon,emqx_retainer,emqx_management,emqx_dashboard"
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
      - emqx-etc:/opt/emqx/etc
    ports:
      - "1883:1883"  # mqtt:tcp
      - "8883:8883"  # mqtt:tcp:ssl
      - "8083:8083"  # mqtt:ws
      - "8084:8084"  # mqtt:ws:ssl
      - "8081:8081"  # http:management
      - "18083:18083"  # http:dashboard
      - "61613:61613"  # web-stomp gateway
    networks:
      emqx-bridge:
        aliases:
          - node1.emqx.local
    healthcheck:
      test: [ "CMD", "/opt/emqx/bin/emqx_ctl", "status" ]
      interval: 5s
      timeout: 25s
      retries: 5
  postgres:
    container_name: hummingbot-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=hummingbot_api
      - POSTGRES_USER=hbot
      - POSTGRES_PASSWORD=hummingbot-api
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - emqx-bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hbot -d hummingbot_api"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  emqx-bridge:
    driver: bridge

volumes:
  emqx-data: { }
  emqx-log: { }
  emqx-etc: { }
  postgres-data: { }
